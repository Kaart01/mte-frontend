<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTE Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>
    <div class="app-container">
        <h1>MTE Calculator</h1>

        <!-- Module Dropdown -->
        <div class="card">
            <label>Module</label>
            <input type="text" id="moduleSearch" placeholder="Search module..." autocomplete="off">
            <ul class="dropdown-list" id="moduleList"></ul>
        </div>

        <!-- Model Dropdown -->
        <div class="card">
            <label>Model</label>
            <input type="text" id="modelSearch" placeholder="Search model..." autocomplete="off">
            <ul class="dropdown-list" id="modelList"></ul>
        </div>

        <!-- Variants Multi-Select -->
        <div class="card">
            <label>Variants</label>
            <input type="text" id="variantSearch" placeholder="Search variants..." autocomplete="off">
            <ul class="dropdown-list" id="variantList"></ul>
            <div class="chips-container" id="variantChips"></div>
        </div>

        <!-- Buttons -->
        <div class="card calculate-card">
            <button id="calculateBtn">Calculate MTE</button>
            <button id="clearBtn" class="small-btn">Clear All</button>
            <div id="mteResult" style="margin-top:12px; font-weight:bold;"></div>
        </div>
    </div>

    <script src="script_v2.js"></script>
</body>
</html>
