<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTE Calculator</title>

  <!-- Fonts & Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

<link rel="icon" href="favicon.ico" type="image/x-icon" />

  <!-- PWA Essentials -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/frame1-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/image2-512.png" />
  
  <!-- Mobile & Theme -->
  <meta name="theme-color" content="#1976D2" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="description" content="Offline-ready MTE Calculator Progressive Web App" />
</head>

<body>
  <div class="app-container">
    <h1>MTE CALCULATOR</h1>

    <!-- Module -->
    <div class="card">
      <label class="floating-label">Module</label>
      <input type="text" id="moduleSearch" placeholder="Search Module..." />
      <select id="moduleSelect" size="5"></select>
    </div>

    <!-- Model -->
    <div class="card">
      <label class="floating-label">Model</label>
      <input type="text" id="modelSearch" placeholder="Search Model..." disabled />
      <select id="modelSelect" size="5" disabled></select>
    </div>

    <!-- Variant -->
    <div class="card">
      <label class="floating-label">Variant</label>
      <input type="text" id="variantSearch" placeholder="Search Variant..." disabled />
      <select id="variantSelect" size="5" disabled></select>
    </div>

    <!-- Selected Chips -->
    <div class="card">
      <label>Selected Variants</label>
      <div id="selectedChips" class="chips-container"></div>
      <button id="clearAllBtn" class="small-btn">Clear All</button>
    </div>

    <!-- Calculate -->
    <div class="card calculate-card">
      <button id="calculateBtn">Calculate MTE</button>
      <p><strong>Total MTE:</strong> <span id="totalMte">0</span></p>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <p>Calculating...</p>
    </div>
  </div>

  <!-- Scripts -->
  <script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(reg => console.log('Service Worker registered', reg))
      .catch(err => console.log('Service Worker failed', err));
  });
}
</script>
</body>
</html>
